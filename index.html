<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地理猜猜樂 終極大滿貫版 🌍</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0f2fe, #ccfbf1);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #1e293b;
            overflow-x: hidden;
        }

        .page-layout {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            box-sizing: border-box;
        }

        .decor-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 50px;
            padding: 20px;
            pointer-events: none;
        }
        .decor-side .icon {
            font-size: 100px;
            filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.1));
            animation: float 3s ease-in-out infinite;
        }
        .decor-side .icon:nth-child(2) { animation-delay: 1.5s; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @media (max-width: 850px) { .decor-side { display: none; } }

        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(15, 23, 42, 0.08);
            text-align: center;
            width: 550px;
            max-width: 100%;
            box-sizing: border-box;
            border: 4px solid #38bdf8;
            position: relative;
        }

        .cover-content { padding: 20px 0; }
        .cover-title {
            font-size: 40px;
            font-weight: 900;
            color: #0284c7;
            margin: 0 0 10px 0;
            letter-spacing: 3px;
            text-shadow: 2px 2px 0px #e0f2fe;
            animation: pulseTitle 2.5s ease-in-out infinite;
        }
        .cover-subtitle {
            font-size: 16px;
            color: #64748b;
            margin-bottom: 40px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .start-game-btn {
            display: inline-block;
            width: 85%;
            padding: 18px;
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            color: white;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .start-game-btn:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 12px 25px rgba(37, 99, 235, 0.4);
            background: linear-gradient(135deg, #38bdf8, #2563eb);
        }

        h2 { font-size: 22px; color: #0369a1; margin-bottom: 25px; font-weight: bold; }
        
        .region-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .menu-btn {
            display: block;
            width: 100%;
            height: 60px;
            background: linear-gradient(135deg, #38bdf8, #0284c7);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 10px rgba(2, 132, 199, 0.2);
        }
        .menu-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(2, 132, 199, 0.3);
        }
        
        .hidden { display: none !important; }
        .question { font-size: 22px; font-weight: bold; margin-bottom: 25px; color: #334155; line-height: 1.5; }
        
        .timer-bar-container {
            width: 100%;
            height: 8px;
            background-color: #e2e8f0;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .timer-bar {
            height: 100%;
            width: 100%;
            background-color: #ef4444;
            transition: width 0.1s linear;
        }

        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 20px; }
        
        .option-btn {
            background-color: #f8fafc;
            border: 2px solid #e2e8f0;
            padding: 14px;
            font-size: 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            text-align: center;
        }
        .option-btn:hover { background-color: #f0fdfa; border-color: #99f6e4; }
        
        .input-area { margin-bottom: 20px; }
        .text-input {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            margin-bottom: 12px;
            box-sizing: border-box;
            text-align: center;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #0d9488;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .result { font-weight: bold; margin-top: 15px; font-size: 22px; }
        
        .explanation-scroll {
            max-height: 280px;
            overflow-y: auto;
            margin-top: 15px;
            padding-right: 5px;
        }
        .explanation-item {
            background-color: #f8fafc;
            border-left: 4px solid #94a3b8;
            padding: 10px 12px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 14px;
            color: #334155;
            text-align: left;
            line-height: 1.5;
        }
        .explanation-item.correct-ans {
            background-color: #f0fdf4;
            border-left-color: #10b981;
            color: #14532d;
        }
        .next-btn {
            width: 100%;
            padding: 14px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
        }

            background: #f0fdfa;
            border: 2px dashed #0d9488;
            padding: 20px;
            border-radius: 16px;
            margin: 20px 0;
        }
        .evaluation-title { font-size: 24px; font-weight: bold; color: #0d9488; margin-bottom: 10px; }
        .evaluation-desc { font-size: 16px; color: #334155; line-height: 1.6; }

        .score { font-size: 14px; color: #64748b; margin-top: 20px; font-weight: bold; }
        .back-btn {
            background: none; border: none; color: #64748b; cursor: pointer; 
            margin-top: 20px; text-decoration: underline; font-size: 14px;
        }
    </style>
</head>
<body>

<div class="page-layout">
    <div class="decor-side"><div class="icon">🌍</div><div class="icon">🧳</div></div>

    <div class="container">
        <div id="screen-cover">
            <div class="cover-content">
                <h1 class="cover-title">地理猜猜樂</h1>
                <div class="cover-subtitle">全球 244 國家大滿貫 • 終極動態干擾版</div>
                <button class="start-game-btn" onclick="showScreen('region')">開始挑戰 ➔</button>
            </div>
        </div>

        <div id="screen-region" class="hidden">
            <h2>請選擇挑戰分區</h2>
            <div class="region-grid">
                <button class="menu-btn" onclick="selectRegion('asia')">亞洲篇 🗺️</button>
                <button class="menu-btn" onclick="selectRegion('europe')">歐洲篇 🏰</button>
                <button class="menu-btn" onclick="selectRegion('africa')">非洲篇 🦁</button>
                <button class="menu-btn" onclick="selectRegion('america')">美洲篇 🦅</button>
                <button class="menu-btn" onclick="selectRegion('oceania')">大洋洲篇 🏄</button>
            </div>
            <button class="menu-btn" style="background: linear-gradient(135deg, #a855f7, #6b21a8);" onclick="selectRegion('world')">世界綜合篇 🌍</button>
            <button class="back-btn" onclick="showScreen('cover')">返回首頁</button>
        </div>
        
        <div id="screen-mode" class="hidden">
            <h2>請選擇挑戰題型</h2>
            <button class="menu-btn" onclick="selectMode('choice')">選擇題模式</button>
            <button class="menu-btn" onclick="selectMode('input')">問答題模式</button>
            <button class="menu-btn" onclick="selectMode('mix')">混合題模式</button>
            <button class="back-btn" onclick="showScreen('region')">返回選擇分區</button>
        </div>

        <div id="screen-count" class="hidden">
            <h2>請選擇挑戰題數</h2>
            <div id="count-hint" style="font-size:14px; color:#64748b; margin-bottom:15px;"></div>
            <button class="menu-btn" onclick="startGame(10)">10 題</button>
            <button class="menu-btn" onclick="startGame(20)">20 題</button>
            <button class="menu-btn" onclick="startGame(30)">30 題</button>
            <button class="back-btn" onclick="showScreen('mode')">返回選擇題型</button>
        </div>

        <div id="screen-game" class="hidden">
            <div class="timer-bar-container"><div id="timer-indicator" class="timer-bar"></div></div>
            <div class="question" id="question-text">題目載入中...</div>
            <div class="options-grid" id="options-container"></div>
            
            <div class="input-area" id="input-container">
                <input type="text" class="text-input" id="answer-input" placeholder="請輸入首都名稱..." autocomplete="off">
                <button class="submit-btn" onclick="checkInputAnswer()">提交答案</button>
            </div>

            <div id="feedback-area" class="hidden">
                <div class="result" id="result-text"></div>
                <div class="explanation-scroll" id="explanations-list"></div>
                <button class="next-btn" onclick="loadNextQuestion()">下一題 ➔</button>
            </div>

            <div class="score" id="score-text">分數: 0 / 0</div>
            <button class="back-btn" onclick="abortGame()">放棄並返回</button>
        </div>

        <div id="screen-end" class="hidden">
            <h2>🏆 挑戰終結 🏆</h2>
            <div id="final-score-text" style="font-size: 22px; font-weight: bold;"></div>
            <div class="evaluation-box">
                <div id="evaluation-title" class="evaluation-title"></div>
                <div id="evaluation-desc" class="evaluation-desc"></div>
            </div>
            <button class="menu-btn" onclick="showScreen('region')">再挑戰一次</button>
            <button class="back-btn" onclick="showScreen('cover')">返回主封面</button>
        </div>
    </div>

    <div class="decor-side"><div class="icon">✈️</div><div class="icon">🧭</div></div>
</div>

            { c: "海地", a: "太子港", d: "位於加勒比海天然港灣，近代飽受地震災難與局勢動盪之苦的悲情之都。" },
            { c: "宏都拉斯", a: "德古斯加巴", d: "高山峽谷中的中美洲都市，其名字在當地語言中代表銀色的山丘。" },
            { c: "薩爾瓦多", a: "聖薩爾瓦多", d: "位於火山帶之上的高密度西半球都市，也是全球首個將比特幣定為法定貨幣的國家首府。" }
        ],
        oceania: [
            { c: "澳洲", a: "坎培拉", d: "為了解決雪梨和墨爾本的競爭而精心設計、全新打造的政治中心花園城市。" },
            { c: "紐西蘭", a: "威靈頓", d: "地球上地理位置最南端的首都，因為地形關係長年強風不斷，被叫作風城。" },
            { c: "斐濟", a: "蘇瓦", d: "南太平洋最重要的港口與經濟中心，洋溢著熱帶海島與殖民風情。" },
            { c: "吐瓦魯", a: "富納富提", d: "是一個極其狹長的環礁。由於氣候暖化海平面上升，面臨巨大的淹水威脅。" },
            { c: "薩摩亞", a: "阿庇亞", d: "玻里尼西亞地區的古老港口，蘇格蘭名作家史蒂文生曾在此定居並長眠於此。" },
            { c: "東加", a: "努庫阿洛發", d: "位於湯加塔布島上，意為仁慈的居所，是南太平洋僅存君主制國家的權力中心。" },
            { c: "巴布亞紐幾內亞", a: "莫士比港", d: "位於珊瑚海畔，地理環境隔絕，是世界上極具文化與語言多樣性的神祕地帶首府。" },
            { c: "索羅門群島", a: "荷尼阿拉", d: "位於瓜達康納爾島，二戰時期著名的太平洋慘烈海戰歷史遺跡戰場就在此地。" },
            { c: "萬那杜", a: "維拉港", d: "位於埃法特島，以豐富的海底清真寺郵局、活火山觀光以及熱情純樸的島民聞名。" },
            { c: "密克羅尼西亞", a: "帕利基爾", d: "位於波納佩島上的高降雨量熱帶高山植物園都市，充滿原始島嶼風貌。" },
            { c: "馬紹爾群島", a: "馬久羅", d: "同樣也是由狹窄的環礁組成的海島都市，整座城市幾乎就是一條長長的沿海公路。" },
            { c: "帛琉", a: "恩吉魯穆德", d: "全世界上人口極其稀少的國家首都，主建築群依山面海仿照美國國會大廈建造。" },
            { c: "吉里巴斯", a: "南塔拉瓦", d: "橫跨赤道與國際換日線的廣闊群島國首府，正面臨嚴峻的海平面上升危機。" },
            { c: "諾魯", a: "亞倫", d: "法理上不設首都，亞倫區為其政府辦公室所在地，是世界上極小的孤立島國行政中心。" }
        ]
    };

    let selectedRegion = 'world';
    let gameMode = ''; 
    let currentPool = []; 
    let currentQuestionIndex = 0;
    let score = 0;
    let totalQuestionsInRound = 10; 
    let currentQuestionType = ''; 

    let timeLeft = 15;
    let timerInterval = null;
    let isAnswered = false;

    // 洗牌演算法
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function showScreen(screenId) {
        document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
        document.getElementById(`screen-${screenId}`).classList.remove('hidden');
    }

    function selectRegion(region) {
        selectedRegion = region;
        showScreen('mode');
    }

    function selectMode(mode) {
        gameMode = mode;
        let maxAvailable = 0;
        if (selectedRegion === 'world') {
            maxAvailable = Object.values(globalDatabase).reduce((sum, list) => sum + list.length, 0);
        } else {
            maxAvailable = globalDatabase[selectedRegion].length;
        }
        document.getElementById('count-hint').innerText = `💡 當前選擇分區總共有 ${maxAvailable} 個國家可供挑戰`;
        showScreen('count');
    }

    function startGame(count) {
        score = 0;
        currentQuestionIndex = 0;

        let basePool = [];
        if (selectedRegion === 'world') {
            Object.values(globalDatabase).forEach(list => { basePool = basePool.concat(list); });
        } else {
            basePool = [...globalDatabase[selectedRegion]];
        }

        let shuffledPool = shuffle(basePool);
        totalQuestionsInRound = Math.min(count, shuffledPool.length);
        currentPool = shuffledPool.slice(0, totalQuestionsInRound);

        showScreen('game');
        loadNextQuestion();
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 15;
        isAnswered = false;
        updateTimerBar();

        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            updateTimerBar();

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                if (!isAnswered) timeOutForcedAnswer();
            }
        }, 100);
    }

    function updateTimerBar() {
        const bar = document.getElementById('timer-indicator');
        const percentage = Math.max(0, (timeLeft / 15) * 100);
        bar.style.width = percentage + "%";
    }

    function timeOutForcedAnswer() {
        isAnswered = true;
        document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
        
        let correct = currentPool[currentQuestionIndex].a;
        const resultDiv = document.getElementById('result-text');
        resultDiv.innerText = `⏳ 時間到！未作答。答案是：${correct}`;
        resultDiv.style.color = "#ef4444";

        showFeedbackBlock(false, correct, generateDynamicOptions(currentPool[currentQuestionIndex]));
    }

    function loadNextQuestion() {
        if (currentQuestionIndex >= currentPool.length) {
            clearInterval(timerInterval);
            endGame();
            return;
        }

        document.getElementById('feedback-area').classList.add('hidden');
        document.getElementById('answer-input').value = "";
        
        let currentData = currentPool[currentQuestionIndex];
        document.getElementById('question-text').innerText = `請問「${currentData.c}」的首都是哪裡？`;
        document.getElementById('score-text').innerText = `進度: ${currentQuestionIndex + 1} / ${currentPool.length} | 分數: ${score}`;

        if (gameMode === 'mix') {
            currentQuestionType = Math.random() < 0.5 ? 'choice' : 'input';
        } else {
            currentQuestionType = gameMode;
        }

        if (currentQuestionType === 'choice') {
            document.getElementById('options-container').classList.remove('hidden');
            document.getElementById('input-container').classList.add('hidden');
            renderDynamicOptions(currentData);
        } else {
            document.getElementById('options-container').classList.add('hidden');
            document.getElementById('input-container').classList.remove('hidden');
            document.getElementById('answer-input').focus();
        }

        startTimer();
    }

    // ⚡ 核心演算法：動態抓取同分區國家組成干擾項，徹底打破死板固定選項！
    function generateDynamicOptions(correctItem) {
        let siblingPool = [];
        // 找出同屬哪個洲
        for (let key in globalDatabase) {
            if (globalDatabase[key].some(item => item.c === correctItem.c)) {
                siblingPool = [...globalDatabase[key]];
                break;
            }
        }
        // 如果該洲國家太少，就用全世界湊
        if (siblingPool.length < 4) {
            siblingPool = [];
            Object.values(globalDatabase).forEach(list => { siblingPool = siblingPool.concat(list); });
        }

        // 過濾掉正確答案
        let filtered = siblingPool.filter(item => item.a !== correctItem.a);
        shuffle(filtered);

        // 挑選3個錯誤首都 + 1個正確首都
        let finalOptions = filtered.slice(0, 3).map(item => ({ a: item.a, d: item.d, c: item.c }));
        finalOptions.push({ a: correctItem.a, d: correctItem.d, c: correctItem.c });
        
        return shuffle(finalOptions);
    }

    function renderDynamicOptions(data) {
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        let dynamicOptions = generateDynamicOptions(data);

        dynamicOptions.forEach(opt => {
            const button = document.createElement('button');
            button.className = 'option-btn';
            button.innerText = opt.a;
            button.onclick = () => checkChoiceAnswer(opt.a, data.a, dynamicOptions);
            container.appendChild(button);
        });
    }

    function checkChoiceAnswer(selected, correct, currentOptions) {
        if(isAnswered) return;
        isAnswered = true;
        clearInterval(timerInterval);

        document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
        const resultDiv = document.getElementById('result-text');
        let isCorrect = selected === correct;

        if (isCorrect) {
            score++;
            resultDiv.innerText = "🎉 答對了！";
            resultDiv.style.color = "#10b981";
        } else {
            resultDiv.innerText = `❌ 答錯了！答案是：${correct}`;
            resultDiv.style.color = "#ef4444";
        }

        showFeedbackBlock(isCorrect, correct, currentOptions);
    }

    function checkInputAnswer() {
        if(isAnswered) return;
        let userAnswer = document.getElementById('answer-input').value.trim();
        let correct = currentPool[currentQuestionIndex].a;
        
        if(userAnswer === "") { alert("請輸入答案！"); return; }

        isAnswered = true;
        clearInterval(timerInterval);

        const resultDiv = document.getElementById('result-text');
        let isCorrect = userAnswer === correct;

        if (isCorrect) {
            score++;
            resultDiv.innerText = "🎉 答對了！";
            resultDiv.style.color = "#10b981";
        } else {
            resultDiv.innerText = `❌ 答錯了！答案是：${correct}`;
            resultDiv.style.color = "#ef4444";
        }

        showFeedbackBlock(isCorrect, correct, null);
    }

    document.getElementById('answer-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkInputAnswer();
    });

    // ⚡ 百萬字級動態百科生成：無論抽到誰當干擾項，100% 都有精美詳解，再也不會資料不齊！
    function showFeedbackBlock(isCorrect, correct, currentOptions) {
        const feedbackArea = document.getElementById('feedback-area');
        const explanationsList = document.getElementById('explanations-list');
        explanationsList.innerHTML = ""; 

        let currentData = currentPool[currentQuestionIndex];

        if (currentQuestionType === 'choice' && currentOptions) {
            currentOptions.forEach(opt => {
                const item = document.createElement('div');
                item.className = 'explanation-item';
                if (opt.a === correct) item.classList.add('correct-ans');
                item.innerHTML = `<strong>• ${opt.a}</strong> (${opt.c})：${opt.d}`;
                explanationsList.appendChild(item);
            });
            document.getElementById('explanations-list').classList.remove('hidden');
        } else {
            // 問答模式直接亮出該題正確國家的詳解
            const item = document.createElement('div');
            item.className = 'explanation-item correct-ans';
            item.innerHTML = `<strong>• ${currentData.a}</strong> (${currentData.c})：${currentData.d}`;
            explanationsList.appendChild(item);
            document.getElementById('explanations-list').classList.remove('hidden');
        }
        
        feedbackArea.classList.remove('hidden');
        currentQuestionIndex++;
    }

    function abortGame() {
        clearInterval(timerInterval);
        showScreen('region');
    }

    function endGame() {
        showScreen('end');
        const wrongCount = currentPool.length - score;
        document.getElementById('final-score-text').innerText = `最終總得分：${score} / ${currentPool.length} (答錯 ${wrongCount} 題)`;

        const evalTitle = document.getElementById('evaluation-title');
        const evalDesc = document.getElementById('evaluation-desc');

        if (wrongCount <= 2) {
            evalTitle.innerText = "👑 地理小天才";
            evalDesc.innerText = "太震撼了！你對這個世界瞭若指掌。不管是偏遠的中亞綠洲首都還是太平洋上的神祕環礁，都難不倒你。地球對你來說根本沒有死角！";
        } else if (wrongCount <= 5) {
            evalTitle.innerText = "🧭 頂尖世界領航員";
            evalDesc.innerText = "非常厲害！你的地理知識儲備遠超常人。只有極少數非常冷門的非洲或歐洲小國讓你稍微失足，稍微複習一下絕對能登頂神壇！";
        } else if (wrongCount <= 10) {
            evalTitle.innerText = "🧳 業餘環球旅行家";
            evalDesc.innerText = "表現不錯！常見的大國和熱門旅遊都市你通通拿分。不過遇到中亞或是冷門西非國家時似乎有點迷路了，多玩幾次就能把地圖補全囉！";
        } else if (wrongCount <= 18) {
            evalTitle.innerText = "🗺️ 拿著地圖看反的人";
            evalDesc.innerText = "哎呀！看來你常常把雪梨當成澳洲首都，或者把里約熱內盧當成巴西首都喔？沒關係，這款遊戲就是最好的學習工具，再挑戰一次吧！";
        } else {
            evalTitle.innerText = "👽 剛降落地球的外星人";
            evalDesc.innerText = "你...你是剛搭飛碟來到地球嗎？怎麼地球的首都對你來說這麼陌生！趕快開啟『選擇題模式』看著百科詳解好好修煉一下地理課吧！";
        }
    }
</script>
